<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <!-- White background -->
  <rect width="1000" height="1000" fill="#FFFFFF"/>

  <!-- Title block -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">PLANO ARQUITECTÓNICO - PLANTA BAJA</text>
  <text x="500" y="62" font-family="Arial, sans-serif" font-size="12" fill="#333333" text-anchor="middle">Escala 1:50 | Vivienda Unifamiliar</text>

  <!-- Grid / reference lines (light) -->
  <line x1="100" y1="100" x2="900" y2="100" stroke="#CCCCCC" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="900" x2="900" y2="900" stroke="#CCCCCC" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="100" x2="100" y2="900" stroke="#CCCCCC" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="900" y1="100" x2="900" y2="900" stroke="#CCCCCC" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- ============================================================ -->
  <!-- EXTERIOR WALLS (outermost boundary)                         -->
  <!-- House footprint: 120,120 to 880,880                        -->
  <!-- ============================================================ -->

  <!-- Outer wall rectangle -->
  <rect x="120" y="120" width="760" height="760" fill="none" stroke="#000000" stroke-width="8"/>

  <!-- ============================================================ -->
  <!-- INTERIOR WALLS                                              -->
  <!-- Layout:                                                     -->
  <!--   Living Room:  120,120  → 620,500  (left-top big area)   -->
  <!--   Kitchen:      620,120  → 880,500  (right-top)           -->
  <!--   Bedroom 1:    120,500  → 430,880  (left-bottom)         -->
  <!--   Bedroom 2:    430,500  → 680,880  (center-bottom)       -->
  <!--   Bathroom:     680,500  → 880,880  (right-bottom)        -->
  <!-- ============================================================ -->

  <!-- Horizontal wall dividing top / bottom halves -->
  <line x1="120" y1="500" x2="880" y2="500" stroke="#000000" stroke-width="8"/>

  <!-- Vertical wall separating Living Room from Kitchen (top half) -->
  <line x1="620" y1="120" x2="620" y2="500" stroke="#000000" stroke-width="8"/>

  <!-- Vertical wall separating Bedroom 1 from Bedroom 2 (bottom half) -->
  <line x1="430" y1="500" x2="430" y2="880" stroke="#000000" stroke-width="8"/>

  <!-- Vertical wall separating Bedroom 2 from Bathroom (bottom half) -->
  <line x1="680" y1="500" x2="680" y2="880" stroke="#000000" stroke-width="8"/>

  <!-- ============================================================ -->
  <!-- DOORS                                                       -->
  <!-- Represented as gap in wall + arc swing                     -->
  <!-- ============================================================ -->

  <!-- Front door (south exterior wall, center of living room) -->
  <!-- Gap in bottom wall of living room area -->
  <line x1="120" y1="880" x2="310" y2="880" stroke="#000000" stroke-width="8"/>
  <line x1="390" y1="880" x2="620" y2="880" stroke="#000000" stroke-width="8"/>
  <!-- Door swing arc -->
  <path d="M 310,880 Q 350,840 390,880" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="310" y1="880" x2="310" y2="840" stroke="#000000" stroke-width="2"/>

  <!-- Living Room to Hallway/Kitchen door (top horizontal center wall) -->
  <!-- Gap in vertical wall between living room and kitchen at y=300 -->
  <line x1="620" y1="120" x2="620" y2="270" stroke="#000000" stroke-width="8"/>
  <line x1="620" y1="350" x2="620" y2="500" stroke="#000000" stroke-width="8"/>
  <path d="M 620,270 Q 660,310 620,350" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="620" y1="270" x2="660" y2="270" stroke="#000000" stroke-width="2"/>

  <!-- Door: horizontal wall Living Room → Bedroom 1 -->
  <line x1="120" y1="500" x2="230" y2="500" stroke="#000000" stroke-width="8"/>
  <line x1="310" y1="500" x2="430" y2="500" stroke="#000000" stroke-width="8"/>
  <path d="M 230,500 Q 270,540 310,500" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="230" y1="500" x2="230" y2="540" stroke="#000000" stroke-width="2"/>

  <!-- Door: horizontal wall Kitchen → Bedroom 2 -->
  <line x1="430" y1="500" x2="540" y2="500" stroke="#000000" stroke-width="8"/>
  <line x1="620" y1="500" x2="880" y2="500" stroke="#000000" stroke-width="8"/>
  <!-- Bedroom 2 door gap in horizontal wall -->
  <line x1="430" y1="500" x2="530" y2="500" stroke="#000000" stroke-width="8"/>
  <line x1="610" y1="500" x2="680" y2="500" stroke="#000000" stroke-width="8"/>
  <path d="M 530,500 Q 570,540 610,500" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="530" y1="500" x2="530" y2="540" stroke="#000000" stroke-width="2"/>

  <!-- Door: Bathroom -->
  <line x1="680" y1="500" x2="680" y2="600" stroke="#000000" stroke-width="8"/>
  <line x1="680" y1="680" x2="680" y2="880" stroke="#000000" stroke-width="8"/>
  <path d="M 680,600 Q 720,640 680,680" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="680" y1="600" x2="720" y2="600" stroke="#000000" stroke-width="2"/>

  <!-- ============================================================ -->
  <!-- WINDOWS                                                     -->
  <!-- Shown as triple line segments on exterior walls             -->
  <!-- ============================================================ -->

  <!-- Window: Living Room north wall -->
  <line x1="200" y1="120" x2="480" y2="120" stroke="#FFFFFF" stroke-width="8"/>
  <line x1="200" y1="116" x2="480" y2="116" stroke="#000000" stroke-width="2"/>
  <line x1="200" y1="120" x2="480" y2="120" stroke="#000000" stroke-width="2"/>
  <line x1="200" y1="124" x2="480" y2="124" stroke="#000000" stroke-width="2"/>
  <line x1="340" y1="116" x2="340" y2="124" stroke="#000000" stroke-width="1.5"/>

  <!-- Window: Kitchen north wall -->
  <line x1="660" y1="120" x2="840" y2="120" stroke="#FFFFFF" stroke-width="8"/>
  <line x1="660" y1="116" x2="840" y2="116" stroke="#000000" stroke-width="2"/>
  <line x1="660" y1="120" x2="840" y2="120" stroke="#000000" stroke-width="2"/>
  <line x1="660" y1="124" x2="840" y2="124" stroke="#000000" stroke-width="2"/>
  <line x1="750" y1="116" x2="750" y2="124" stroke="#000000" stroke-width="1.5"/>

  <!-- Window: Bedroom 1 west wall -->
  <line x1="120" y1="580" x2="120" y2="780" stroke="#FFFFFF" stroke-width="8"/>
  <line x1="116" y1="580" x2="116" y2="780" stroke="#000000" stroke-width="2"/>
  <line x1="120" y1="580" x2="120" y2="780" stroke="#000000" stroke-width="2"/>
  <line x1="124" y1="580" x2="124" y2="780" stroke="#000000" stroke-width="2"/>
  <line x1="116" y1="680" x2="124" y2="680" stroke="#000000" stroke-width="1.5"/>

  <!-- Window: Bedroom 2 south wall -->
  <line x1="460" y1="880" x2="650" y2="880" stroke="#FFFFFF" stroke-width="8"/>
  <line x1="460" y1="876" x2="650" y2="876" stroke="#000000" stroke-width="2"/>
  <line x1="460" y1="880" x2="650" y2="880" stroke="#000000" stroke-width="2"/>
  <line x1="460" y1="884" x2="650" y2="884" stroke="#000000" stroke-width="2"/>
  <line x1="555" y1="876" x2="555" y2="884" stroke="#000000" stroke-width="1.5"/>

  <!-- Window: Bathroom east wall -->
  <line x1="880" y1="580" x2="880" y2="780" stroke="#FFFFFF" stroke-width="8"/>
  <line x1="876" y1="580" x2="876" y2="780" stroke="#000000" stroke-width="2"/>
  <line x1="880" y1="580" x2="880" y2="780" stroke="#000000" stroke-width="2"/>
  <line x1="884" y1="580" x2="884" y2="780" stroke="#000000" stroke-width="2"/>
  <line x1="876" y1="680" x2="884" y2="680" stroke="#000000" stroke-width="1.5"/>

  <!-- ============================================================ -->
  <!-- ROOM LABELS                                                 -->
  <!-- ============================================================ -->

  <!-- Living Room label -->
  <text x="365" y="295" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#000000" text-anchor="middle">SALA DE ESTAR</text>
  <text x="365" y="322" font-family="Arial, sans-serif" font-size="13" fill="#555555" text-anchor="middle">22.4 m²</text>

  <!-- Kitchen label -->
  <text x="750" y="295" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000000" text-anchor="middle">COCINA</text>
  <text x="750" y="318" font-family="Arial, sans-serif" font-size="13" fill="#555555" text-anchor="middle">13.0 m²</text>

  <!-- Bedroom 1 label -->
  <text x="275" y="670" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">DORMITORIO 1</text>
  <text x="275" y="693" font-family="Arial, sans-serif" font-size="13" fill="#555555" text-anchor="middle">16.2 m²</text>

  <!-- Bedroom 2 label -->
  <text x="555" y="670" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#000000" text-anchor="middle">DORMITORIO 2</text>
  <text x="555" y="693" font-family="Arial, sans-serif" font-size="13" fill="#555555" text-anchor="middle">12.5 m²</text>

  <!-- Bathroom label -->
  <text x="780" y="670" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000000" text-anchor="middle">BAÑO</text>
  <text x="780" y="692" font-family="Arial, sans-serif" font-size="13" fill="#555555" text-anchor="middle">7.2 m²</text>

  <!-- ============================================================ -->
  <!-- FIXTURES (simplified)                                       -->
  <!-- ============================================================ -->

  <!-- Kitchen counter (L-shape along north and east walls) -->
  <rect x="632" y="132" width="236" height="50" fill="none" stroke="#000000" stroke-width="3"/>
  <rect x="836" y="132" width="32" height="200" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Kitchen sink symbol -->
  <rect x="700" y="137" width="60" height="40" fill="none" stroke="#000000" stroke-width="2"/>
  <circle cx="730" cy="157" r="12" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Bathroom fixtures -->
  <!-- Toilet -->
  <rect x="692" y="740" width="55" height="70" rx="5" fill="none" stroke="#000000" stroke-width="3"/>
  <ellipse cx="719" cy="790" rx="22" ry="16" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Sink -->
  <rect x="760" y="520" width="50" height="45" rx="5" fill="none" stroke="#000000" stroke-width="3"/>
  <circle cx="785" cy="542" r="8" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Shower/Tub -->
  <rect x="752" y="700" width="110" height="110" fill="none" stroke="#000000" stroke-width="3"/>
  <line x1="752" y1="700" x2="862" y2="810" stroke="#000000" stroke-width="1"/>
  <line x1="862" y1="700" x2="752" y2="810" stroke="#000000" stroke-width="1"/>
  <circle cx="807" cy="755" r="12" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- ============================================================ -->
  <!-- DIMENSION LINES                                             -->
  <!-- ============================================================ -->

  <!-- Overall width dimension -->
  <line x1="120" y1="950" x2="880" y2="950" stroke="#000000" stroke-width="1"/>
  <line x1="120" y1="945" x2="120" y2="955" stroke="#000000" stroke-width="1"/>
  <line x1="880" y1="945" x2="880" y2="955" stroke="#000000" stroke-width="1"/>
  <text x="500" y="970" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">12.00 m</text>

  <!-- Overall height dimension -->
  <line x1="950" y1="120" x2="950" y2="880" stroke="#000000" stroke-width="1"/>
  <line x1="945" y1="120" x2="955" y2="120" stroke="#000000" stroke-width="1"/>
  <line x1="945" y1="880" x2="955" y2="880" stroke="#000000" stroke-width="1"/>
  <text x="970" y="504" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle" transform="rotate(90 970 504)">12.00 m</text>

  <!-- North arrow -->
  <g transform="translate(870, 900)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#000000" stroke-width="1.5"/>
    <polygon points="0,-22 6,10 0,5 -6,10" fill="#000000"/>
    <text x="0" y="-28" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000000" text-anchor="middle">N</text>
  </g>

  <!-- Scale bar -->
  <text x="130" y="950" font-family="Arial, sans-serif" font-size="10" fill="#000000">0</text>
  <text x="163" y="950" font-family="Arial, sans-serif" font-size="10" fill="#000000">1m</text>
  <text x="226" y="950" font-family="Arial, sans-serif" font-size="10" fill="#000000">3m</text>
  <rect x="140" y="937" width="63" height="6" fill="#000000"/>
  <rect x="203" y="937" width="63" height="6" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>

</svg>
