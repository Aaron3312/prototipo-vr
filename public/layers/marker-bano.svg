<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <!-- White background -->
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Grid lines every 100px -->
  <g stroke="#EEEEEE" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
  </g>

  <!-- Cross-hatch pattern for visual richness (AR tracking) -->
  <g stroke="#DDDDDD" stroke-width="0.5" opacity="0.5">
    <line x1="150" y1="0" x2="150" y2="800"/>
    <line x1="250" y1="0" x2="250" y2="800"/>
    <line x1="350" y1="0" x2="350" y2="800"/>
    <line x1="450" y1="0" x2="450" y2="800"/>
    <line x1="550" y1="0" x2="550" y2="800"/>
    <line x1="650" y1="0" x2="650" y2="800"/>
    <line x1="750" y1="0" x2="750" y2="800"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="0" y1="550" x2="800" y2="550"/>
    <line x1="0" y1="650" x2="800" y2="650"/>
    <line x1="0" y1="750" x2="800" y2="750"/>
  </g>

  <!-- Corner fiducial markers (high contrast for AR tracking) -->
  <rect x="10" y="10" width="60" height="60" fill="#000000"/>
  <rect x="20" y="20" width="40" height="40" fill="#FFFFFF"/>
  <rect x="30" y="30" width="20" height="20" fill="#000000"/>

  <rect x="730" y="10" width="60" height="60" fill="#000000"/>
  <rect x="740" y="20" width="40" height="40" fill="#FFFFFF"/>
  <rect x="750" y="30" width="20" height="20" fill="#000000"/>

  <rect x="10" y="730" width="60" height="60" fill="#000000"/>
  <rect x="20" y="740" width="40" height="40" fill="#FFFFFF"/>
  <rect x="30" y="750" width="20" height="20" fill="#000000"/>

  <rect x="730" y="730" width="60" height="60" fill="#000000"/>
  <rect x="740" y="740" width="40" height="40" fill="#FFFFFF"/>
  <rect x="750" y="750" width="20" height="20" fill="#000000"/>

  <!-- Border frame for AR tracking -->
  <rect x="5" y="5" width="790" height="790" fill="none" stroke="#000000" stroke-width="4"/>

  <!-- Room walls outline (80,80) to (720,720) -->
  <rect x="80" y="80" width="640" height="640" fill="none" stroke="#000000" stroke-width="10"/>

  <!-- Wall thickness fill -->
  <rect x="80" y="80" width="640" height="10" fill="#000000"/>
  <rect x="80" y="710" width="640" height="10" fill="#000000"/>
  <rect x="80" y="80" width="10" height="640" fill="#000000"/>
  <rect x="710" y="80" width="10" height="640" fill="#000000"/>

  <!-- ===== TOILET (bottom-right area) ===== -->
  <!-- Toilet base/tank -->
  <rect x="560" y="570" width="120" height="80" rx="5" fill="none" stroke="#000000" stroke-width="8"/>
  <!-- Toilet bowl -->
  <ellipse cx="620" cy="640" rx="55" ry="65" fill="none" stroke="#000000" stroke-width="8"/>
  <!-- Toilet tank detail -->
  <rect x="570" y="580" width="100" height="55" rx="3" fill="none" stroke="#000000" stroke-width="5"/>
  <line x1="620" y1="580" x2="620" y2="570" stroke="#000000" stroke-width="4"/>
  <!-- Toilet seat -->
  <ellipse cx="620" cy="650" rx="45" ry="55" fill="none" stroke="#000000" stroke-width="4" stroke-dasharray="5,3"/>
  <!-- Label -->
  <text x="620" y="730" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000000">WC</text>

  <!-- ===== SINK (top-right area) ===== -->
  <!-- Sink outline -->
  <rect x="570" y="110" width="110" height="90" rx="10" fill="none" stroke="#000000" stroke-width="8"/>
  <!-- Sink basin -->
  <rect x="585" y="125" width="80" height="65" rx="8" fill="none" stroke="#000000" stroke-width="5"/>
  <!-- Drain -->
  <circle cx="625" cy="157" r="8" fill="none" stroke="#000000" stroke-width="4"/>
  <circle cx="625" cy="157" r="3" fill="#000000"/>
  <!-- Faucet -->
  <rect x="615" y="110" width="20" height="15" rx="3" fill="#000000"/>
  <line x1="625" y1="115" x2="625" y2="130" stroke="#000000" stroke-width="5"/>
  <!-- Label -->
  <text x="625" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000000">LAVABO</text>

  <!-- ===== SHOWER (left side) ===== -->
  <!-- Shower tray outline -->
  <rect x="110" y="110" width="200" height="200" fill="none" stroke="#000000" stroke-width="8"/>
  <!-- Shower walls (thicker lines on 3 sides) -->
  <rect x="110" y="110" width="200" height="200" fill="none" stroke="#000000" stroke-width="5" stroke-dasharray="8,4"/>
  <!-- Shower head position -->
  <circle cx="160" cy="160" r="20" fill="none" stroke="#000000" stroke-width="6"/>
  <circle cx="160" cy="160" r="5" fill="#000000"/>
  <!-- Shower head spray pattern -->
  <line x1="160" y1="140" x2="160" y2="125" stroke="#000000" stroke-width="4"/>
  <line x1="150" y1="145" x2="140" y2="133" stroke="#000000" stroke-width="3"/>
  <line x1="170" y1="145" x2="180" y2="133" stroke="#000000" stroke-width="3"/>
  <!-- Drain -->
  <circle cx="210" cy="280" r="12" fill="none" stroke="#000000" stroke-width="5"/>
  <line x1="203" y1="280" x2="217" y2="280" stroke="#000000" stroke-width="3"/>
  <line x1="210" y1="273" x2="210" y2="287" stroke="#000000" stroke-width="3"/>
  <!-- Shower door line -->
  <line x1="310" y1="110" x2="310" y2="310" stroke="#000000" stroke-width="6"/>
  <line x1="290" y1="200" x2="310" y2="200" stroke="#000000" stroke-width="4"/>
  <!-- Label -->
  <text x="210" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000000">DUCHA</text>

  <!-- Dimension lines -->
  <g stroke="#000000" stroke-width="2" fill="#000000">
    <!-- Horizontal dimension -->
    <line x1="80" y1="760" x2="720" y2="760"/>
    <line x1="80" y1="750" x2="80" y2="770"/>
    <line x1="720" y1="750" x2="720" y2="770"/>
    <text x="400" y="757" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#000000">6.40 m</text>
    <!-- Vertical dimension -->
    <line x1="760" y1="80" x2="760" y2="720"/>
    <line x1="750" y1="80" x2="770" y2="80"/>
    <line x1="750" y1="720" x2="770" y2="720"/>
    <text x="757" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#000000" transform="rotate(90,757,404)">6.40 m</text>
  </g>

  <!-- Scale indicator -->
  <rect x="320" y="748" width="80" height="6" fill="#000000"/>
  <text x="360" y="774" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#000000">1:50</text>

  <!-- North arrow -->
  <g transform="translate(740,150)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#000000" stroke-width="2"/>
    <polygon points="0,-18 -8,10 0,5 8,10" fill="#000000"/>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000000">N</text>
  </g>

  <!-- Title block -->
  <rect x="80" y="30" width="640" height="40" fill="#000000"/>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="8">BAÑO</text>

  <!-- Subtitle line -->
  <text x="400" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555555">PLANTA ARQUITECTÓNICA — ESCALA 1:50</text>

  <!-- QR-like pattern at center for AR richness -->
  <g transform="translate(380,420)">
    <rect x="-30" y="-30" width="20" height="20" fill="#000000" opacity="0.15"/>
    <rect x="10" y="-30" width="20" height="20" fill="#000000" opacity="0.15"/>
    <rect x="-30" y="10" width="20" height="20" fill="#000000" opacity="0.15"/>
    <rect x="10" y="10" width="20" height="20" fill="#000000" opacity="0.15"/>
    <rect x="-10" y="-10" width="20" height="20" fill="#000000" opacity="0.15"/>
  </g>

  <!-- Hatch area between toilet and sink -->
  <g stroke="#AAAAAA" stroke-width="1" opacity="0.6">
    <line x1="555" y1="215" x2="720" y2="215"/>
    <line x1="555" y1="230" x2="720" y2="230"/>
    <line x1="555" y1="245" x2="720" y2="245"/>
    <line x1="555" y1="260" x2="720" y2="260"/>
    <line x1="555" y1="275" x2="720" y2="275"/>
    <line x1="555" y1="290" x2="720" y2="290"/>
    <line x1="555" y1="305" x2="720" y2="305"/>
    <line x1="555" y1="320" x2="720" y2="320"/>
    <line x1="555" y1="335" x2="720" y2="335"/>
    <line x1="555" y1="350" x2="720" y2="350"/>
    <line x1="555" y1="365" x2="720" y2="365"/>
    <line x1="555" y1="380" x2="720" y2="380"/>
    <line x1="555" y1="395" x2="720" y2="395"/>
    <line x1="555" y1="410" x2="720" y2="410"/>
    <line x1="555" y1="425" x2="720" y2="425"/>
    <line x1="555" y1="440" x2="720" y2="440"/>
    <line x1="555" y1="455" x2="720" y2="455"/>
    <line x1="555" y1="470" x2="720" y2="470"/>
    <line x1="555" y1="485" x2="720" y2="485"/>
    <line x1="555" y1="500" x2="720" y2="500"/>
    <line x1="555" y1="515" x2="720" y2="515"/>
    <line x1="555" y1="530" x2="720" y2="530"/>
    <line x1="555" y1="545" x2="720" y2="545"/>
    <line x1="555" y1="560" x2="720" y2="560"/>
  </g>

  <!-- Mid-wall line (internal partition hint) -->
  <line x1="555" y1="90" x2="555" y2="720" stroke="#000000" stroke-width="6"/>
  <line x1="310" y1="90" x2="310" y2="315" stroke="#000000" stroke-width="4"/>

</svg>
