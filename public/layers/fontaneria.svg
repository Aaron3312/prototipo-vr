<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <!-- TRANSPARENT background - no background rect -->

  <!-- Layer label -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#60A5FA" text-anchor="middle">FONTANERÍA</text>
  <text x="500" y="62" font-family="Arial, sans-serif" font-size="12" fill="#60A5FA" text-anchor="middle">Instalación de Agua Fría y Caliente</text>

  <!-- ============================================================ -->
  <!-- MAIN WATER ENTRY POINT                                      -->
  <!-- Entry from south wall, center-left                          -->
  <!-- ============================================================ -->
  <rect x="340" y="872" width="30" height="16" fill="none" stroke="#60A5FA" stroke-width="2.5"/>
  <text x="355" y="900" font-family="Arial, sans-serif" font-size="9" fill="#60A5FA" text-anchor="middle">ENTRADA</text>
  <text x="355" y="912" font-family="Arial, sans-serif" font-size="9" fill="#60A5FA" text-anchor="middle">AGUA</text>

  <!-- ============================================================ -->
  <!-- MAIN SUPPLY PIPES (cold water - solid blue)                 -->
  <!-- Run from entry up through house                             -->
  <!-- ============================================================ -->

  <!-- Main cold water riser from entry point -->
  <polyline points="355,872 355,820 355,700 355,620 355,540 430,540 620,540 700,540 700,460 780,460 780,360" fill="none" stroke="#60A5FA" stroke-width="5" stroke-dasharray="14,6"/>

  <!-- Branch to kitchen -->
  <polyline points="700,540 700,460 700,360 700,240 750,240" fill="none" stroke="#60A5FA" stroke-width="4" stroke-dasharray="12,5"/>

  <!-- Branch to bathroom from main riser at x=700, y=540 -->
  <polyline points="700,540 760,540 760,600 780,620 780,740 780,800" fill="none" stroke="#60A5FA" stroke-width="4" stroke-dasharray="12,5"/>

  <!-- Hot water branch from boiler (near kitchen) to bathroom -->
  <!-- Boiler location: kitchen, near east wall -->
  <polyline points="840,360 840,420 840,460 840,540 840,620 840,680 840,760 780,760" fill="none" stroke="#3B82F6" stroke-width="3.5" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- ============================================================ -->
  <!-- WATER BOILER / HEATER (in kitchen)                         -->
  <!-- ============================================================ -->
  <circle cx="840" cy="360" r="28" fill="none" stroke="#60A5FA" stroke-width="3"/>
  <circle cx="840" cy="360" r="18" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="840" y="355" font-family="Arial, sans-serif" font-size="9" fill="#60A5FA" text-anchor="middle">TERMO</text>
  <text x="840" y="368" font-family="Arial, sans-serif" font-size="9" fill="#60A5FA" text-anchor="middle">ACS</text>

  <!-- ============================================================ -->
  <!-- WATER CONNECTION POINTS (blue filled circles)               -->
  <!-- ============================================================ -->

  <!-- Connection: main entry -->
  <circle cx="355" cy="872" r="9" fill="#60A5FA"/>

  <!-- Connection: kitchen cold water -->
  <circle cx="750" cy="240" r="9" fill="#60A5FA"/>

  <!-- Connection: kitchen hot water -->
  <circle cx="840" cy="460" r="7" fill="#3B82F6"/>

  <!-- Connection: bathroom cold water branch -->
  <circle cx="780" cy="620" r="9" fill="#60A5FA"/>

  <!-- Connection: bathroom hot water -->
  <circle cx="780" cy="760" r="9" fill="#3B82F6"/>

  <!-- Connection: main riser junction kitchen branch -->
  <circle cx="700" cy="460" r="7" fill="#60A5FA"/>

  <!-- Connection: main riser turn -->
  <circle cx="355" cy="540" r="7" fill="#60A5FA"/>

  <!-- ============================================================ -->
  <!-- BATHROOM FIXTURES (blue rectangles/shapes)                 -->
  <!-- Same coordinate system as plano-base.svg                   -->
  <!-- Bathroom: 680,500 → 880,880                                -->
  <!-- ============================================================ -->

  <!-- Toilet (blue outline) -->
  <rect x="692" y="740" width="55" height="70" rx="5" fill="#60A5FA" fill-opacity="0.15" stroke="#60A5FA" stroke-width="3"/>
  <ellipse cx="719" cy="792" rx="22" ry="16" fill="#60A5FA" fill-opacity="0.2" stroke="#60A5FA" stroke-width="2"/>
  <!-- Water feed to toilet -->
  <circle cx="692" cy="800" r="5" fill="#60A5FA"/>
  <line x1="692" y1="800" x2="680" y2="800" stroke="#60A5FA" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Sink / washbasin (blue rectangle) -->
  <rect x="760" y="520" width="50" height="45" rx="5" fill="#60A5FA" fill-opacity="0.15" stroke="#60A5FA" stroke-width="3"/>
  <circle cx="785" cy="542" r="8" fill="#60A5FA" fill-opacity="0.3" stroke="#60A5FA" stroke-width="1.5"/>
  <!-- Hot + cold feed to sink -->
  <circle cx="770" cy="520" r="5" fill="#60A5FA"/>
  <circle cx="800" cy="520" r="5" fill="#3B82F6"/>
  <line x1="785" y1="520" x2="785" y2="460" stroke="#60A5FA" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Shower / Bañera (blue rectangle) -->
  <rect x="752" y="700" width="110" height="110" fill="#60A5FA" fill-opacity="0.12" stroke="#60A5FA" stroke-width="3"/>
  <circle cx="807" cy="755" r="14" fill="none" stroke="#60A5FA" stroke-width="2"/>
  <!-- Shower drain -->
  <circle cx="807" cy="755" r="5" fill="#60A5FA" fill-opacity="0.4"/>
  <!-- Water feed to shower -->
  <circle cx="752" cy="720" r="5" fill="#60A5FA"/>
  <circle cx="752" cy="740" r="5" fill="#3B82F6"/>
  <line x1="752" y1="730" x2="700" y2="730" stroke="#60A5FA" stroke-width="3" stroke-dasharray="6,3"/>
  <!-- Drainage pipe from shower -->
  <line x1="807" y1="810" x2="807" y2="880" stroke="#60A5FA" stroke-width="2.5" stroke-dasharray="5,4" opacity="0.6"/>

  <!-- ============================================================ -->
  <!-- KITCHEN SINK (blue rectangle)                               -->
  <!-- Kitchen: 620,120 → 880,500                                 -->
  <!-- Counter along north wall                                    -->
  <!-- ============================================================ -->

  <!-- Kitchen sink fixture -->
  <rect x="698" y="135" width="62" height="42" rx="3" fill="#60A5FA" fill-opacity="0.15" stroke="#60A5FA" stroke-width="3"/>
  <!-- Double basin -->
  <rect x="702" y="139" width="25" height="34" rx="2" fill="#60A5FA" fill-opacity="0.2" stroke="#60A5FA" stroke-width="1.5"/>
  <rect x="731" y="139" width="25" height="34" rx="2" fill="#60A5FA" fill-opacity="0.2" stroke="#60A5FA" stroke-width="1.5"/>
  <!-- Faucet -->
  <circle cx="729" cy="142" r="4" fill="#60A5FA"/>
  <!-- Water connections to kitchen sink -->
  <circle cx="710" cy="135" r="5" fill="#60A5FA"/>
  <circle cx="748" cy="135" r="5" fill="#3B82F6"/>
  <!-- Feed pipes to kitchen sink -->
  <line x1="729" y1="135" x2="729" y2="120" stroke="#60A5FA" stroke-width="3" stroke-dasharray="6,3"/>
  <!-- Drain from kitchen sink -->
  <line x1="729" y1="177" x2="729" y2="240" stroke="#60A5FA" stroke-width="2.5" stroke-dasharray="5,4" opacity="0.6"/>

  <!-- ============================================================ -->
  <!-- DRAIN PIPES (lighter, thinner, dotted)                      -->
  <!-- ============================================================ -->

  <!-- Kitchen drain → exterior -->
  <polyline points="729,240 729,300 800,300 860,300 860,880" fill="none" stroke="#93C5FD" stroke-width="2.5" stroke-dasharray="6,5" opacity="0.7"/>

  <!-- Bathroom drain → exterior -->
  <polyline points="780,880 780,870" fill="none" stroke="#93C5FD" stroke-width="2.5" stroke-dasharray="6,5" opacity="0.7"/>
  <polyline points="807,880 860,880" fill="none" stroke="#93C5FD" stroke-width="2.5" stroke-dasharray="6,5" opacity="0.7"/>

  <!-- Drain exit point -->
  <circle cx="860" cy="880" r="8" fill="none" stroke="#60A5FA" stroke-width="2"/>
  <text x="860" y="900" font-family="Arial, sans-serif" font-size="9" fill="#60A5FA" text-anchor="middle">SALIDA</text>

  <!-- ============================================================ -->
  <!-- LEGEND                                                      -->
  <!-- ============================================================ -->
  <rect x="130" y="910" width="480" height="68" fill="none" stroke="#60A5FA" stroke-width="1" opacity="0.5"/>
  <text x="145" y="926" font-family="Arial, sans-serif" font-size="10" fill="#60A5FA">SIMBOLOGÍA:</text>

  <line x1="145" y1="942" x2="210" y2="942" stroke="#60A5FA" stroke-width="4" stroke-dasharray="12,5"/>
  <text x="218" y="946" font-family="Arial, sans-serif" font-size="10" fill="#60A5FA">Agua fría (AF)</text>

  <line x1="310" y1="942" x2="375" y2="942" stroke="#3B82F6" stroke-width="3.5" stroke-dasharray="8,4"/>
  <text x="383" y="946" font-family="Arial, sans-serif" font-size="10" fill="#60A5FA">Agua caliente (AC)</text>

  <line x1="490" y1="942" x2="555" y2="942" stroke="#93C5FD" stroke-width="2.5" stroke-dasharray="6,5"/>
  <text x="563" y="946" font-family="Arial, sans-serif" font-size="10" fill="#60A5FA">Desagüe</text>

  <circle cx="155" cy="962" r="6" fill="#60A5FA"/>
  <text x="168" y="966" font-family="Arial, sans-serif" font-size="10" fill="#60A5FA">Punto de conexión</text>

  <rect x="295" y="956" width="30" height="12" rx="2" fill="#60A5FA" fill-opacity="0.15" stroke="#60A5FA" stroke-width="2"/>
  <text x="333" y="966" font-family="Arial, sans-serif" font-size="10" fill="#60A5FA">Aparato sanitario</text>

</svg>
