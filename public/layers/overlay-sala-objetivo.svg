  <g opacity="0.92">
    <circle cx="135" cy="280" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="135" y1="268" x2="135" y2="292" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="123" y1="280" x2="147" y2="280" stroke="#1F2937" stroke-width="2.5"/>
  </g>
  <g opacity="0.92">
    <circle cx="135" cy="520" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="135" y1="508" x2="135" y2="532" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="123" y1="520" x2="147" y2="520" stroke="#1F2937" stroke-width="2.5"/>
  </g>

  <!-- Right wall outlets -->
  <g opacity="0.92">
    <circle cx="665" cy="280" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="665" y1="268" x2="665" y2="292" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="653" y1="280" x2="677" y2="280" stroke="#1F2937" stroke-width="2.5"/>
  </g>
  <g opacity="0.92">
    <circle cx="665" cy="520" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="665" y1="508" x2="665" y2="532" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="653" y1="520" x2="677" y2="520" stroke="#1F2937" stroke-width="2.5"/>
  </g>

  <!-- Bottom wall outlets -->
  <g opacity="0.92">
    <circle cx="200" cy="680" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="200" y1="668" x2="200" y2="692" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="188" y1="680" x2="212" y2="680" stroke="#1F2937" stroke-width="2.5"/>
  </g>
  <g opacity="0.92">
    <circle cx="560" cy="680" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="560" y1="668" x2="560" y2="692" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="548" y1="680" x2="572" y2="680" stroke="#1F2937" stroke-width="2.5"/>
  </g>

  <!-- TV wall outlet (top wall near TV) -->
  <g opacity="0.92">
    <circle cx="260" cy="155" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="260" y1="143" x2="260" y2="167" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="248" y1="155" x2="272" y2="155" stroke="#1F2937" stroke-width="2.5"/>
  </g>
  <g opacity="0.92">
    <circle cx="540" cy="155" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="540" y1="143" x2="540" y2="167" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="528" y1="155" x2="552" y2="155" stroke="#1F2937" stroke-width="2.5"/>
  </g>

  <!-- ===== CEILING LIGHT POINTS — larger circles r=20 ===== -->
  <!-- Main center ceiling light -->
  <circle cx="400" cy="400" r="20" fill="#FBBF24" opacity="0.85" stroke="#D97706" stroke-width="3"/>
  <circle cx="400" cy="400" r="10" fill="#FEF3C7" opacity="0.9"/>
  <!-- Light rays -->
  <g stroke="#FBBF24" stroke-width="2.5" opacity="0.7">
    <line x1="400" y1="374" x2="400" y2="360"/>
    <line x1="419" y1="381" x2="430" y2="370"/>
    <line x1="426" y1="400" x2="440" y2="400"/>
    <line x1="419" y1="419" x2="430" y2="430"/>
    <line x1="400" y1="426" x2="400" y2="440"/>
    <line x1="381" y1="419" x2="370" y2="430"/>
    <line x1="374" y1="400" x2="360" y2="400"/>
    <line x1="381" y1="381" x2="370" y2="370"/>
