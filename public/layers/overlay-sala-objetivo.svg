    <line x1="315" y1="543" x2="324" y2="534"/>
    <line x1="320" y1="560" x2="333" y2="560"/>
    <line x1="315" y1="577" x2="324" y2="586"/>
    <line x1="300" y1="584" x2="300" y2="597"/>
    <line x1="285" y1="577" x2="276" y2="586"/>
    <line x1="280" y1="560" x2="267" y2="560"/>
    <line x1="285" y1="543" x2="276" y2="534"/>
