  <text x="483" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">COND. ELECT. H=2.50m</text>

  <!-- Left wall conduit height -->
  <rect x="142" y="268" width="115" height="20" rx="10" fill="#111827" opacity="0.82"/>
  <text x="200" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">TOMA 1.20m</text>

  <!-- Right wall conduit height -->
  <rect x="543" y="268" width="115" height="20" rx="10" fill="#111827" opacity="0.82"/>
  <text x="600" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">TOMA 1.20m</text>

  <!-- Ceiling light annotation -->
  <rect x="408" y="406" width="130" height="20" rx="10" fill="#111827" opacity="0.82"/>
  <text x="473" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">LUMINARIA TECHO</text>

  <!-- Switch annotation -->
  <rect x="220" y="625" width="90" height="20" rx="10" fill="#111827" opacity="0.82"/>
  <text x="265" y="639" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">SW H=1.10m</text>

  <!-- Panel annotation -->
  <rect x="612" y="350" width="80" height="20" rx="10" fill="#111827" opacity="0.82"/>
  <text x="652" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">PANEL 200A</text>

  <!-- Outlet bottom annotation -->
  <rect x="140" y="692" width="100" height="20" rx="10" fill="#111827" opacity="0.82"/>
  <text x="190" y="706" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">TOMA H=0.30m</text>

  <!-- Secondary light annotation -->
  <rect x="220" y="566" width="75" height="20" rx="10" fill="#111827" opacity="0.82"/>
  <text x="257" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">LUM. AUX.</text>

  <!-- ===== LEGEND ===== -->
  <rect x="90" y="430" width="195" height="120" rx="5" fill="#111827" opacity="0.78"/>
  <text x="188" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">LEYENDA ELÉCTRICA</text>
  <line x1="100" y1="465" x2="130" y2="465" stroke="#FBBF24" stroke-width="5" stroke-dasharray="10,4"/>
  <text x="145" y="469" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Conduit 3/4"</text>
  <circle cx="115" cy="482" r="6" fill="#FBBF24" stroke="#D97706" stroke-width="1.5"/>
  <line x1="109" y1="482" x2="121" y2="482" stroke="#1F2937" stroke-width="1.5"/>
  <line x1="115" y1="476" x2="115" y2="488" stroke="#1F2937" stroke-width="1.5"/>
  <text x="145" y="486" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Toma de corriente</text>
  <circle cx="115" cy="499" r="8" fill="#FBBF24" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="115" cy="499" r="4" fill="#FEF3C7"/>
  <text x="145" y="503" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Punto de luz</text>
  <rect x="108" y="511" width="16" height="12" rx="2" fill="#FBBF24"/>
  <text x="145" y="520" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Interruptor</text>
  <line x1="100" y1="535" x2="130" y2="535" stroke="#F97316" stroke-width="5"/>
  <text x="145" y="539" font-family="Arial, sans-serif" font-size="11" fill="#FDBA74">Acometida principal</text>

  <!-- ===== MAIN LABEL "INSTALACIÓN OBJETIVO" ===== -->
  <rect x="90" y="90" width="310" height="38" rx="4" fill="#15803D" opacity="0.92"/>
  <text x="102" y="115" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#FFFFFF">INSTALACIÓN OBJETIVO</text>

  <rect x="90" y="135" width="260" height="24" rx="3" fill="#111827" opacity="0.75"/>
  <text x="102" y="152" font-family="Arial, sans-serif" font-size="13" fill="#86EFAC">Electricidad — SALA DE ESTAR</text>

