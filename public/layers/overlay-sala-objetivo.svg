  <line x1="665" y1="400" x2="665" y2="135" stroke="#F97316" stroke-width="6" opacity="0.9"/>
  <!-- Arrow indicating feed direction -->
  <polygon points="665,155 658,175 672,175" fill="#F97316" opacity="0.9"/>

  <!-- Ground connection symbol -->
  <g transform="translate(704,450)" opacity="0.8">
    <line x1="0" y1="0" x2="0" y2="12" stroke="#F97316" stroke-width="3"/>
    <line x1="-8" y1="12" x2="8" y2="12" stroke="#F97316" stroke-width="3"/>
    <line x1="-5" y1="16" x2="5" y2="16" stroke="#F97316" stroke-width="2"/>
    <line x1="-2" y1="20" x2="2" y2="20" stroke="#F97316" stroke-width="1.5"/>
  </g>

  <!-- ===== MEASUREMENT ANNOTATIONS — white text on dark pills ===== -->
