<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <!-- Transparent background -->

  <!-- ===== ELECTRICAL CONDUIT SYSTEM — YELLOW (#FBBF24) near ceiling ===== -->

  <!-- Main horizontal conduit along TOP wall (near ceiling H=2.50m) -->
  <line x1="90" y1="135" x2="710" y2="135" stroke="#FBBF24" stroke-width="5" stroke-dasharray="20,7" opacity="0.9"/>

  <!-- Main horizontal conduit along BOTTOM wall -->
  <line x1="90" y1="680" x2="315" y2="680" stroke="#FBBF24" stroke-width="5" stroke-dasharray="20,7" opacity="0.9"/>
  <line x1="485" y1="680" x2="710" y2="680" stroke="#FBBF24" stroke-width="5" stroke-dasharray="20,7" opacity="0.9"/>

  <!-- Left wall vertical conduit -->
  <line x1="135" y1="90" x2="135" y2="710" stroke="#FBBF24" stroke-width="5" stroke-dasharray="20,7" opacity="0.9"/>

  <!-- Right wall vertical conduit -->
  <line x1="665" y1="90" x2="665" y2="710" stroke="#FBBF24" stroke-width="5" stroke-dasharray="20,7" opacity="0.9"/>

  <!-- Cross conduit to center ceiling light (from top) -->
  <line x1="400" y1="135" x2="400" y2="400" stroke="#FBBF24" stroke-width="4" stroke-dasharray="15,6" opacity="0.8"/>

  <!-- Cross conduit to center light (from right) -->
  <line x1="665" y1="400" x2="400" y2="400" stroke="#FBBF24" stroke-width="4" stroke-dasharray="15,6" opacity="0.75"/>

  <!-- Branch conduit to TV wall area (top) -->
  <line x1="260" y1="135" x2="260" y2="165" stroke="#FBBF24" stroke-width="4" opacity="0.85"/>
  <line x1="540" y1="135" x2="540" y2="165" stroke="#FBBF24" stroke-width="4" opacity="0.85"/>

  <!-- Branch conduit to right wall mid-height outlets -->
  <line x1="665" y1="280" x2="710" y2="280" stroke="#FBBF24" stroke-width="4" opacity="0.8"/>
  <line x1="665" y1="520" x2="710" y2="520" stroke="#FBBF24" stroke-width="4" opacity="0.8"/>

  <!-- Branch conduit to left wall mid-height outlets -->
  <line x1="135" y1="280" x2="90" y2="280" stroke="#FBBF24" stroke-width="4" opacity="0.8"/>
  <line x1="135" y1="520" x2="90" y2="520" stroke="#FBBF24" stroke-width="4" opacity="0.8"/>

  <!-- ===== OUTLET BOXES — yellow circles r=12 with + symbol ===== -->
  <!-- Top wall outlets -->
  <g opacity="0.92">
    <circle cx="200" cy="135" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="200" cy="123" x1="200" x2="200" y2="147" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="188" y1="135" x2="212" y2="135" stroke="#1F2937" stroke-width="2.5"/>
  </g>
  <g opacity="0.92">
    <circle cx="350" cy="135" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="350" y1="123" x2="350" y2="147" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="338" y1="135" x2="362" y2="135" stroke="#1F2937" stroke-width="2.5"/>
  </g>
  <g opacity="0.92">
    <circle cx="450" cy="135" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="450" y1="123" x2="450" y2="147" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="438" y1="135" x2="462" y2="135" stroke="#1F2937" stroke-width="2.5"/>
  </g>
  <g opacity="0.92">
    <circle cx="600" cy="135" r="12" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
    <line x1="600" y1="123" x2="600" y2="147" stroke="#1F2937" stroke-width="2.5"/>
    <line x1="588" y1="135" x2="612" y2="135" stroke="#1F2937" stroke-width="2.5"/>
  </g>

