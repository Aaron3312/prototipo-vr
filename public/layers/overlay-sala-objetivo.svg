    <line x1="350" y1="135" x2="450" y2="135"/>
    <line x1="450" y1="135" x2="600" y2="135"/>
    <!-- Circuit B: left-right outlets -->
    <line x1="135" y1="280" x2="665" y2="280"/>
    <line x1="135" y1="520" x2="665" y2="520"/>
    <!-- Circuit C: bottom outlets -->
    <line x1="200" y1="680" x2="560" y2="680"/>
  </g>

  <!-- ===== ORANGE — MAIN PANEL CONNECTION (#F97316) from right wall ===== -->
  <!-- Main panel box (right wall, middle) -->
  <rect x="698" y="360" width="22" height="80" rx="3" fill="#F97316" opacity="0.9" stroke="#EA580C" stroke-width="2"/>
