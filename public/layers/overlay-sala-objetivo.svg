  <line x1="702" y1="370" x2="716" y2="370" stroke="#FED7AA" stroke-width="2"/>
  <line x1="702" y1="378" x2="716" y2="378" stroke="#FED7AA" stroke-width="2"/>
  <line x1="702" y1="386" x2="716" y2="386" stroke="#FED7AA" stroke-width="2"/>
  <line x1="702" y1="394" x2="716" y2="394" stroke="#FED7AA" stroke-width="2"/>
  <line x1="702" y1="402" x2="716" y2="402" stroke="#FED7AA" stroke-width="2"/>
  <line x1="702" y1="410" x2="716" y2="410" stroke="#FED7AA" stroke-width="2"/>
  <line x1="702" y1="418" x2="716" y2="418" stroke="#FED7AA" stroke-width="2"/>
  <line x1="702" y1="426" x2="716" y2="426" stroke="#FED7AA" stroke-width="2"/>
  <!-- Panel label -->
