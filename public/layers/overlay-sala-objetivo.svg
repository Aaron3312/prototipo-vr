  <text x="317" y="672" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97706">SW1</text>
  <!-- Conduit from switch box to bottom wall conduit -->
  <line x1="317" y1="660" x2="317" y2="680" stroke="#FBBF24" stroke-width="4" opacity="0.85"/>

  <!-- Switch box 2 (3-way) -->
  <rect x="455" y="635" width="35" height="25" rx="3" fill="#FBBF24" opacity="0.85" stroke="#D97706" stroke-width="2"/>
  <line x1="463" y1="643" x2="463" y2="654" stroke="#1F2937" stroke-width="2"/>
  <line x1="463" y1="643" x2="477" y2="648" stroke="#1F2937" stroke-width="2"/>
  <circle cx="480" cy="643" r="3" fill="#1F2937"/>
  <text x="472" y="672" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97706">SW2</text>
  <line x1="472" y1="660" x2="472" y2="680" stroke="#FBBF24" stroke-width="4" opacity="0.85"/>

  <!-- ===== CIRCUIT PATHS — light yellow lines between outlets ===== -->
