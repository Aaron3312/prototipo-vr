    <line x1="600" y1="250" x2="613" y2="250"/>
    <line x1="595" y1="267" x2="604" y2="276"/>
    <line x1="580" y1="274" x2="580" y2="287"/>
    <line x1="565" y1="267" x2="556" y2="276"/>
    <line x1="560" y1="250" x2="547" y2="250"/>
    <line x1="565" y1="233" x2="556" y2="224"/>
