<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>AR Planos - Construcción</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; font-family: -apple-system, sans-serif; }

      #ui {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: 999;
      }

      #header {
        position: absolute;
        top: 16px; left: 16px; right: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .badge {
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        backdrop-filter: blur(8px);
      }

      #status {
        background: rgba(234,179,8,0.8);
        color: white;
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        backdrop-filter: blur(8px);
        animation: pulse 2s infinite;
      }

      #status.found {
        background: rgba(34,197,94,0.8);
        animation: none;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }

      #buttons {
        position: absolute;
        bottom: 32px; left: 0; right: 0;
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 0 16px;
        pointer-events: all;
      }

      .layer-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 12px 18px;
        border-radius: 18px;
        border: 2px solid transparent;
        font-size: 13px;
        font-weight: 700;
        color: white;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: all 0.2s;
        min-width: 80px;
      }

      .layer-btn .icon { font-size: 22px; }
      .layer-btn .tag { font-size: 10px; opacity: 0.8; }

      .layer-btn.off {
        background: rgba(0,0,0,0.4);
        color: rgba(255,255,255,0.4);
        transform: scale(0.95);
      }

      #loading {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        color: white;
      }

      #loading .spinner {
        font-size: 48px;
        animation: spin 1.5s linear infinite;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      #loading p { font-size: 18px; font-weight: 600; }
      #loading small { font-size: 13px; opacity: 0.5; }
    </style>
  </head>
  <body>

    <!-- Loading screen -->
    <div id="loading">
      <div class="spinner">⚙️</div>
      <p>Cargando AR...</p>
      <small>Puede tomar unos segundos</small>
    </div>

    <!-- UI overlay -->
    <div id="ui">
      <div id="header">
        <div class="badge">AR Planos</div>
        <div id="status">Apunta al plano impreso</div>
      </div>
      <div id="buttons">
        <button class="layer-btn" id="btn-electrico" style="background: rgba(251,191,36,0.8); border-color: #FBBF24;" onclick="toggleLayer('electrico', '#FBBF24')">
          <span class="icon">⚡</span>
          <span>Eléctrico</span>
          <span class="tag">ON</span>
        </button>
        <button class="layer-btn" id="btn-fontaneria" style="background: rgba(96,165,250,0.8); border-color: #60A5FA;" onclick="toggleLayer('fontaneria', '#60A5FA')">
          <span class="icon">💧</span>
          <span>Fontanería</span>
          <span class="tag">ON</span>
        </button>
        <button class="layer-btn" id="btn-acabados" style="background: rgba(52,211,153,0.8); border-color: #34D399;" onclick="toggleLayer('acabados', '#34D399')">
          <span class="icon">🏠</span>
          <span>Acabados</span>
          <span class="tag">ON</span>
        </button>
      </div>
    </div>

    <!-- A-Frame Scene -->
    <a-scene
      mindar-image="imageTargetSrc: /targets/plano.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="img-plano"      src="/layers/plano-base.svg" />
        <img id="img-electrico"  src="/layers/electrico.svg" />
        <img id="img-fontaneria" src="/layers/fontaneria.svg" />
        <img id="img-acabados"   src="/layers/acabados.svg" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image src="#img-plano"      position="0 0 0"     width="1" height="1"></a-image>
        <a-image id="layer-electrico"  src="#img-electrico"  position="0 0 0.001" width="1" height="1"></a-image>
        <a-image id="layer-fontaneria" src="#img-fontaneria" position="0 0 0.002" width="1" height="1"></a-image>
        <a-image id="layer-acabados"   src="#img-acabados"   position="0 0 0.003" width="1" height="1"></a-image>
      </a-entity>
    </a-scene>

    <script>
      const layerState = { electrico: true, fontaneria: true, acabados: true };
      const layerColors = { electrico: '#FBBF24', fontaneria: '#60A5FA', acabados: '#34D399' };

      function toggleLayer(name, color) {
        layerState[name] = !layerState[name];
        const el = document.getElementById('layer-' + name);
        if (el) el.setAttribute('visible', layerState[name]);
        const btn = document.getElementById('btn-' + name);
        const tag = btn.querySelector('.tag');
        if (layerState[name]) {
          btn.classList.remove('off');
          btn.style.background = `rgba(${hexToRgb(color)},0.8)`;
          btn.style.borderColor = color;
          tag.textContent = 'ON';
        } else {
          btn.classList.add('off');
          btn.style.background = '';
          btn.style.borderColor = 'transparent';
          tag.textContent = 'OFF';
        }
      }

      function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `${r},${g},${b}`;
      }

      // Ocultar loading cuando la escena está lista
      const scene = document.querySelector('a-scene');
      scene.addEventListener('loaded', () => {
        document.getElementById('loading').style.display = 'none';
      });

      // Estado del target
      scene.addEventListener('markerFound', () => {
        const s = document.getElementById('status');
        s.textContent = 'Plano detectado ✓';
        s.classList.add('found');
      });
      scene.addEventListener('markerLost', () => {
        const s = document.getElementById('status');
        s.textContent = 'Apunta al plano impreso';
        s.classList.remove('found');
      });
    </script>
  </body>
</html>
