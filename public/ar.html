<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Planos - Construcción</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; }

    #ui {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* Header */
    #header {
      position: absolute;
      top: 16px; left: 16px; right: 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .badge {
      background: rgba(0,0,0,0.65);
      color: white; padding: 6px 14px;
      border-radius: 999px; font-size: 13px; font-weight: 700;
      backdrop-filter: blur(10px);
    }
    #status {
      background: rgba(234,179,8,0.85);
      color: white; padding: 6px 14px;
      border-radius: 999px; font-size: 13px; font-weight: 700;
      backdrop-filter: blur(10px);
      animation: pulse 2s infinite;
    }
    #status.found { background: rgba(34,197,94,0.85); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

    /* Info card - aparece cuando hay target */
    #info-card {
      position: absolute;
      top: 64px; left: 16px; right: 16px;
      background: rgba(0,0,0,0.7);
      border-radius: 16px; padding: 14px 16px;
      backdrop-filter: blur(10px);
      display: none;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #info-card.visible { display: block; }
    #room-title {
      font-size: 18px; font-weight: 800; color: white;
      margin-bottom: 8px;
    }
    #progress-bar-bg {
      background: rgba(255,255,255,0.15);
      border-radius: 999px; height: 8px; overflow: hidden;
      margin-bottom: 6px;
    }
    #progress-bar-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #22C55E, #86EFAC);
      transition: width 0.5s ease;
    }
    #progress-label {
      font-size: 12px; color: rgba(255,255,255,0.6);
    }
    #pending-items {
      margin-top: 10px;
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .item-chip {
      font-size: 11px; font-weight: 600; padding: 4px 10px;
      border-radius: 999px;
    }
    .item-chip.pending { background: rgba(239,68,68,0.2); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.4); }
    .item-chip.done    { background: rgba(34,197,94,0.2);  color: #86EFAC; border: 1px solid rgba(34,197,94,0.4); }

    /* Toggle actual/objetivo */
    #toggle-wrap {
      position: absolute;
      bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      border-radius: 999px; padding: 4px;
      display: none; gap: 0;
      pointer-events: all;
      backdrop-filter: blur(10px);
    }
    #toggle-wrap.visible { display: flex; }
    .toggle-btn {
      padding: 10px 22px; border-radius: 999px;
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.5);
      border: none; background: transparent; cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn.active {
      background: white; color: #111;
    }

    /* Instrucción escanear */
    #scan-hint {
      position: absolute;
      bottom: 160px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: rgba(255,255,255,0.7);
      padding: 10px 20px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
      backdrop-filter: blur(10px);
      white-space: nowrap;
      pointer-events: none;
      animation: pulse 2s infinite;
    }

    /* Loading */
    #loading {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      z-index: 9999; color: white;
    }
    #loading .spinner { font-size: 48px; animation: spin 1.5s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    #loading p { font-size: 18px; font-weight: 700; }
    #loading small { font-size: 13px; opacity: .5; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner">⚙️</div>
  <p>Cargando AR...</p>
  <small>Puede tomar unos segundos</small>
</div>

<div id="ui">
  <div id="header">
    <div class="badge">🏗️ AR Construcción</div>
    <div id="status">Apunta a un marcador</div>
  </div>

  <div id="info-card">
    <div id="room-title">—</div>
    <div id="progress-bar-bg"><div id="progress-bar-fill" style="width:0%"></div></div>
    <div id="progress-label">Cargando...</div>
    <div id="pending-items"></div>
  </div>

  <div id="scan-hint">📷 Apunta al plano impreso</div>

  <div id="toggle-wrap">
    <button class="toggle-btn active" id="btn-actual"   onclick="setView('actual')">Estado actual</button>
    <button class="toggle-btn"        id="btn-objetivo" onclick="setView('objetivo')">Qué debe haber</button>
  </div>
</div>

<a-scene
  mindar-image="imageTargetSrc: /targets/plano.mind; autoStart: true;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <!-- Baño -->
    <img id="img-bano-marker"   src="/layers/marker-bano.svg" />
    <img id="img-bano-actual"   src="/layers/overlay-bano-actual.svg" />
    <img id="img-bano-objetivo" src="/layers/overlay-bano-objetivo.svg" />
    <!-- Sala -->
    <img id="img-sala-marker"   src="/layers/marker-sala.svg" />
    <img id="img-sala-actual"   src="/layers/overlay-sala-actual.svg" />
    <img id="img-sala-objetivo" src="/layers/overlay-sala-objetivo.svg" />
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- TARGET 0: BAÑO -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-image src="#img-bano-marker"   position="0 0 0"     width="1" height="1"></a-image>
    <a-image id="bano-actual"         src="#img-bano-actual"   position="0 0 0.001" width="1" height="1" visible="true"></a-image>
    <a-image id="bano-objetivo"       src="#img-bano-objetivo" position="0 0 0.001" width="1" height="1" visible="false"></a-image>
  </a-entity>

  <!-- TARGET 1: SALA -->
  <a-entity mindar-image-target="targetIndex: 1">
    <a-image src="#img-sala-marker"   position="0 0 0"     width="1" height="1"></a-image>
    <a-image id="sala-actual"         src="#img-sala-actual"   position="0 0 0.001" width="1" height="1" visible="true"></a-image>
    <a-image id="sala-objetivo"       src="#img-sala-objetivo" position="0 0 0.001" width="1" height="1" visible="false"></a-image>
  </a-entity>

</a-scene>

<script>
  const rooms = {
    0: {
      name: '🚿 Baño',
      progress: 35,
      items: [
        { label: 'Tuberías agua fría', done: true },
        { label: 'Tuberías agua caliente', done: false },
        { label: 'Drenaje', done: true },
        { label: 'Cableado eléctrico', done: false },
        { label: 'Revestimiento', done: false },
      ]
    },
    1: {
      name: '🛋️ Sala',
      progress: 20,
      items: [
        { label: 'Cableado principal', done: false },
        { label: 'Tomacorrientes', done: false },
        { label: 'Puntos de luz', done: true },
        { label: 'Interruptores', done: false },
        { label: 'Acabado de piso', done: false },
      ]
    }
  };

  let currentRoom = null;
  let currentView = 'actual';

  function setView(view) {
    currentView = view;
    document.getElementById('btn-actual').classList.toggle('active', view === 'actual');
    document.getElementById('btn-objetivo').classList.toggle('active', view === 'objetivo');

    if (currentRoom === null) return;
    const prefix = currentRoom === 0 ? 'bano' : 'sala';
    document.getElementById(prefix + '-actual').setAttribute('visible', view === 'actual');
    document.getElementById(prefix + '-objetivo').setAttribute('visible', view === 'objetivo');
  }

  function showRoom(index) {
    currentRoom = index;
    const room = rooms[index];
    document.getElementById('status').textContent = room.name + ' detectado ✓';
    document.getElementById('status').classList.add('found');
    document.getElementById('info-card').classList.add('visible');
    document.getElementById('scan-hint').style.display = 'none';
    document.getElementById('toggle-wrap').classList.add('visible');
    document.getElementById('room-title').textContent = room.name;
    document.getElementById('progress-bar-fill').style.width = room.progress + '%';
    document.getElementById('progress-label').textContent = room.progress + '% completado';
    const itemsEl = document.getElementById('pending-items');
    itemsEl.innerHTML = room.items.map(i =>
      `<span class="item-chip ${i.done ? 'done' : 'pending'}">${i.done ? '✓' : '⚠'} ${i.label}</span>`
    ).join('');
    setView(currentView);
  }

  function hideRoom() {
    currentRoom = null;
    document.getElementById('status').textContent = 'Apunta a un marcador';
    document.getElementById('status').classList.remove('found');
    document.getElementById('info-card').classList.remove('visible');
    document.getElementById('scan-hint').style.display = '';
    document.getElementById('toggle-wrap').classList.remove('visible');
    // ocultar todas las capas
    ['bano-actual','bano-objetivo','sala-actual','sala-objetivo']
      .forEach(id => {
        const el = document.getElementById(id);
        if (el) el.setAttribute('visible', false);
      });
  }

  const scene = document.querySelector('a-scene');

  scene.addEventListener('loaded', () => {
    document.getElementById('loading').style.display = 'none';

    // Eventos por target
    scene.querySelectorAll('[mindar-image-target]').forEach((entity, index) => {
      entity.addEventListener('targetFound', () => showRoom(index));
      entity.addEventListener('targetLost',  () => hideRoom());
    });
  });
</script>
</body>
</html>
