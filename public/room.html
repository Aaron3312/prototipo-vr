<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Construcción - Explorar</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100dvh;width:100vw}

    #camera{
      position:fixed;inset:0;width:100%;height:100%;
      object-fit:cover;z-index:0;
    }

    /* ── OVERLAY ── */
    #overlay-img{
      position:fixed;inset:0;width:100%;height:100%;
      object-fit:cover;z-index:1;
      opacity:0;transition:opacity .5s ease;
      pointer-events:none;
    }
    #overlay-img.visible{opacity:.75}

    /* ── UI BASE ── */
    #ui{position:fixed;inset:0;z-index:10;pointer-events:none}

    /* ── HEADER ── */
    #header{
      position:absolute;top:16px;left:16px;right:16px;
      display:flex;justify-content:space-between;align-items:center;gap:8px
    }
    .badge{
      background:rgba(0,0,0,.65);color:#fff;
      padding:6px 14px;border-radius:999px;
      font-size:13px;font-weight:700;backdrop-filter:blur(10px)
    }
    #mode-badge{background:rgba(59,130,246,.8)}

    /* ── COMPASS ── */
    #compass{
      position:absolute;top:72px;right:16px;
      width:64px;height:64px;
      background:rgba(0,0,0,.6);border-radius:50%;
      backdrop-filter:blur(10px);
      border:2px solid rgba(255,255,255,.15);
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    #compass-ring{
      width:56px;height:56px;border-radius:50%;
      position:relative;transition:transform .1s ease;
    }
    .compass-dot{
      position:absolute;width:8px;height:8px;border-radius:50%;
      transform-origin:28px 28px;
      transform:translate(-50%,-50%) rotate(var(--a)) translateY(-20px);
      left:50%;top:50%;
    }
    #compass-needle{
      position:absolute;width:2px;height:20px;
      background:linear-gradient(to bottom,#ef4444,rgba(239,68,68,0));
      left:50%;top:50%;transform:translate(-50%,-100%);
      border-radius:2px;
    }

    /* ── INFO CARD ── */
    #info-card{
      position:absolute;top:72px;left:16px;
      max-width:220px;
      background:rgba(0,0,0,.7);border-radius:16px;
      padding:14px 16px;backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.1);
      display:none;
    }
    #info-card.show{display:block}
    #room-name{font-size:17px;font-weight:800;color:#fff;margin-bottom:8px}
    #prog-bg{background:rgba(255,255,255,.15);border-radius:999px;height:7px;overflow:hidden;margin-bottom:5px}
    #prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#22c55e,#86efac);transition:width .5s}
    #prog-label{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:10px}
    #checklist{display:flex;flex-direction:column;gap:5px}
    .check-item{font-size:11px;font-weight:600;padding:4px 8px;border-radius:8px;display:flex;align-items:center;gap:6px}
    .check-item.done{background:rgba(34,197,94,.2);color:#86efac}
    .check-item.pending{background:rgba(239,68,68,.2);color:#fca5a5}

    /* ── TOGGLE ACTUAL/OBJETIVO ── */
    #view-toggle{
      position:absolute;bottom:110px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.7);border-radius:999px;padding:4px;
      display:none;pointer-events:all;backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.1);
    }
    #view-toggle.show{display:flex}
    .vbtn{
      padding:9px 20px;border-radius:999px;font-size:13px;font-weight:700;
      color:rgba(255,255,255,.5);border:none;background:transparent;cursor:pointer;
      transition:all .2s;
    }
    .vbtn.active{background:#fff;color:#111}

    /* ── SCAN HINT ── */
    #scan-hint{
      position:absolute;bottom:170px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.6);color:rgba(255,255,255,.75);
      padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;
      backdrop-filter:blur(10px);white-space:nowrap;
      animation:pulse 2s infinite;
    }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    /* ── SETUP MODE ── */
    #setup-panel{
      position:absolute;bottom:0;left:0;right:0;
      background:rgba(0,0,0,.85);backdrop-filter:blur(16px);
      border-top:1px solid rgba(255,255,255,.1);
      padding:20px 20px 32px;
      pointer-events:all;
    }
    #setup-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px}
    #setup-sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px}
    #setup-rooms{display:flex;flex-direction:column;gap:8px}
    .setup-room{
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(255,255,255,.07);border-radius:12px;padding:12px 14px;
      border:1px solid rgba(255,255,255,.08);
    }
    .setup-room-info{display:flex;flex-direction:column;gap:2px}
    .setup-room-name{font-size:14px;font-weight:700;color:#fff}
    .setup-room-status{font-size:11px;color:rgba(255,255,255,.4)}
    .setup-room-status.saved{color:#22c55e}
    .mark-btn{
      padding:8px 16px;border-radius:999px;font-size:12px;font-weight:700;
      border:none;cursor:pointer;transition:all .2s;
    }
    .mark-btn.idle{background:rgba(59,130,246,.8);color:#fff}
    .mark-btn.done{background:rgba(34,197,94,.2);color:#86efac;border:1px solid rgba(34,197,94,.4)}
    #setup-done-btn{
      margin-top:14px;width:100%;padding:14px;border-radius:14px;
      font-size:15px;font-weight:800;border:none;cursor:pointer;
      background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;
      opacity:.4;pointer-events:none;transition:all .2s;
    }
    #setup-done-btn.ready{opacity:1;pointer-events:all}

    /* ── BOTTOM BAR ── */
    #bottom-bar{
      position:absolute;bottom:0;left:0;right:0;
      display:flex;justify-content:space-around;align-items:center;
      padding:12px 16px 28px;
      background:rgba(0,0,0,.6);backdrop-filter:blur(12px);
      border-top:1px solid rgba(255,255,255,.08);
      pointer-events:all;
    }
    .bar-btn{
      display:flex;flex-direction:column;align-items:center;gap:4px;
      font-size:11px;font-weight:600;color:rgba(255,255,255,.6);
      border:none;background:transparent;cursor:pointer;padding:4px 12px;
      border-radius:12px;transition:all .2s;
    }
    .bar-btn .icon{font-size:22px}
    .bar-btn:active{background:rgba(255,255,255,.1)}

    /* ── LOADING ── */
    #loading{
      position:fixed;inset:0;background:#000;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
      z-index:9999;color:#fff;
    }
    .spin{font-size:48px;animation:spin 1.5s linear infinite}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    #loading p{font-size:18px;font-weight:700}
    #loading small{font-size:13px;opacity:.4}

    /* ── TOAST ── */
    #toast{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      background:rgba(34,197,94,.9);color:#fff;
      padding:14px 24px;border-radius:16px;font-size:15px;font-weight:700;
      z-index:9999;display:none;backdrop-filter:blur(10px);
      animation:toastIn .3s ease;
    }
    @keyframes toastIn{from{opacity:0;transform:translate(-50%,-40%)}to{opacity:1;transform:translate(-50%,-50%)}}
  </style>
</head>
<body>

<div id="loading">
  <div class="spin">📷</div>
  <p>Iniciando cámara...</p>
  <small>Acepta el permiso de cámara</small>
</div>

<video id="camera" autoplay playsinline muted></video>
<img  id="overlay-img" src="" alt=""/>

<div id="ui">
  <!-- Header -->
  <div id="header">
    <div class="badge" id="mode-badge">🏗️ AR Construcción</div>
    <div class="badge" id="heading-badge">0°</div>
  </div>

  <!-- Compass -->
  <div id="compass">
    <div id="compass-ring">
      <div id="compass-needle"></div>
    </div>
  </div>

  <!-- Info card -->
  <div id="info-card">
    <div id="room-name">—</div>
    <div id="prog-bg"><div id="prog-fill" style="width:0%"></div></div>
    <div id="prog-label">0% completado</div>
    <div id="checklist"></div>
  </div>

  <!-- Scan hint -->
  <div id="scan-hint">🔄 Rota el celular para explorar</div>

  <!-- View toggle -->
  <div id="view-toggle">
    <button class="vbtn active" onclick="setView('actual')">Estado actual</button>
    <button class="vbtn"        onclick="setView('objetivo')">Qué debe haber</button>
  </div>

  <!-- Setup panel (first time) -->
  <div id="setup-panel">
    <div id="setup-title">⚙️ Configuración inicial</div>
    <div id="setup-sub">Apunta a cada área y toca "Marcar" para fijar su posición</div>
    <div id="setup-rooms"></div>
    <button id="setup-done-btn" onclick="finishSetup()">Listo, explorar →</button>
  </div>

  <!-- Bottom bar (exploración) -->
  <div id="bottom-bar" style="display:none">
    <button class="bar-btn" onclick="openSetup()">
      <span class="icon">⚙️</span><span>Reconfigurar</span>
    </button>
    <button class="bar-btn" onclick="resetMap()">
      <span class="icon">🗑️</span><span>Borrar mapa</span>
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── DATOS DE ROOMS ──
const ROOMS_DATA = {
  bano: {
    name: '🚿 Baño',
    progress: 35,
    actualImg: '/layers/overlay-bano-actual.svg',
    objetivoImg: '/layers/overlay-bano-objetivo.svg',
    items: [
      { label: 'Tuberías agua fría',     done: true  },
      { label: 'Tuberías agua caliente', done: false },
      { label: 'Drenaje',                done: true  },
      { label: 'Cableado eléctrico',     done: false },
      { label: 'Revestimiento',          done: false },
    ]
  },
  sala: {
    name: '🛋️ Sala',
    progress: 20,
    actualImg: '/layers/overlay-sala-actual.svg',
    objetivoImg: '/layers/overlay-sala-objetivo.svg',
    items: [
      { label: 'Cableado principal', done: false },
      { label: 'Tomacorrientes',     done: false },
      { label: 'Puntos de luz',      done: true  },
      { label: 'Interruptores',      done: false },
      { label: 'Acabado de piso',    done: false },
    ]
  }
};

const ROOM_IDS = Object.keys(ROOMS_DATA);

// ── STATE ──
let heading = 0;
let roomMap = {};        // { bano: { heading: 45 }, sala: { heading: 180 } }
let currentRoom = null;
let currentView = 'actual';
let isSetupMode = true;

// ── STORAGE ──
function loadMap() {
  try { return JSON.parse(localStorage.getItem('ar-room-map') || '{}'); } catch { return {}; }
}
function saveMap() {
  localStorage.setItem('ar-room-map', JSON.stringify(roomMap));
}

// ── CAMERA ──
async function startCamera() {
  const video = document.getElementById('camera');
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  document.getElementById('loading').style.display = 'none';
}

// ── ORIENTATION ──
function startOrientation() {
  const handler = (e) => {
    const raw = e.absolute ? e.alpha : (e.webkitCompassHeading ?? e.alpha ?? 0);
    heading = Math.round((360 - raw + 360) % 360);
    document.getElementById('heading-badge').textContent = heading + '°';
    document.getElementById('compass-ring').style.transform = `rotate(${-heading}deg)`;
    if (!isSetupMode) checkCurrentRoom();
  };

  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(p => {
      if (p === 'granted') window.addEventListener('deviceorientation', handler, true);
    });
  } else {
    window.addEventListener('deviceorientationabsolute', handler, true);
    window.addEventListener('deviceorientation', handler, true);
  }
}

// ── ROOM DETECTION ──
function angleDiff(a, b) {
  let d = Math.abs(a - b) % 360;
  return d > 180 ? 360 - d : d;
}

function checkCurrentRoom() {
  let found = null;
  for (const id of ROOM_IDS) {
    if (roomMap[id] === undefined) continue;
    if (angleDiff(heading, roomMap[id]) < 45) { found = id; break; }
  }
  if (found !== currentRoom) {
    currentRoom = found;
    updateOverlay();
  }
}

function updateOverlay() {
  const overlay = document.getElementById('overlay-img');
  const infoCard = document.getElementById('info-card');
  const viewToggle = document.getElementById('view-toggle');
  const scanHint = document.getElementById('scan-hint');

  if (!currentRoom) {
    overlay.classList.remove('visible');
    infoCard.classList.remove('show');
    viewToggle.classList.remove('show');
    scanHint.style.display = '';
    return;
  }

  const data = ROOMS_DATA[currentRoom];
  const src = currentView === 'actual' ? data.actualImg : data.objetivoImg;
  overlay.src = src;
  overlay.classList.add('visible');
  scanHint.style.display = 'none';
  viewToggle.classList.add('show');

  // Info card
  infoCard.classList.add('show');
  document.getElementById('room-name').textContent = data.name;
  document.getElementById('prog-fill').style.width = data.progress + '%';
  document.getElementById('prog-label').textContent = data.progress + '% completado';
  document.getElementById('checklist').innerHTML = data.items.map(i =>
    `<div class="check-item ${i.done?'done':'pending'}">${i.done?'✓':'◯'} ${i.label}</div>`
  ).join('');
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.vbtn').forEach((b,i) =>
    b.classList.toggle('active', (i===0 && v==='actual') || (i===1 && v==='objetivo'))
  );
  updateOverlay();
}

// ── SETUP ──
function buildSetupUI() {
  const container = document.getElementById('setup-rooms');
  container.innerHTML = ROOM_IDS.map(id => {
    const data = ROOMS_DATA[id];
    const saved = roomMap[id] !== undefined;
    return `
    <div class="setup-room" id="setup-${id}">
      <div class="setup-room-info">
        <div class="setup-room-name">${data.name}</div>
        <div class="setup-room-status ${saved?'saved':''}" id="status-${id}">
          ${saved ? `✓ Guardado (${roomMap[id]}°)` : 'Apunta hacia esta área'}
        </div>
      </div>
      <button class="mark-btn ${saved?'done':'idle'}" id="btn-${id}" onclick="markRoom('${id}')">
        ${saved ? '✓ Marcado' : 'Marcar'}
      </button>
    </div>`;
  }).join('');
  checkSetupDone();
}

function markRoom(id) {
  roomMap[id] = heading;
  saveMap();

  document.getElementById(`status-${id}`).textContent = `✓ Guardado (${heading}°)`;
  document.getElementById(`status-${id}`).classList.add('saved');
  document.getElementById(`btn-${id}`).className = 'mark-btn done';
  document.getElementById(`btn-${id}`).textContent = '✓ Marcado';

  // Add compass dot
  addCompassDot(id, heading);
  checkSetupDone();
  showToast(`${ROOMS_DATA[id].name} marcado a ${heading}°`);
}

function checkSetupDone() {
  const allDone = ROOM_IDS.every(id => roomMap[id] !== undefined);
  document.getElementById('setup-done-btn').classList.toggle('ready', allDone);
}

function finishSetup() {
  isSetupMode = false;
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('bottom-bar').style.display = 'flex';
  document.getElementById('mode-badge').textContent = '🔍 Explorando';
  updateOverlay();
}

function openSetup() {
  isSetupMode = true;
  document.getElementById('setup-panel').style.display = 'block';
  document.getElementById('bottom-bar').style.display = 'none';
  document.getElementById('mode-badge').textContent = '⚙️ Configuración';
  document.getElementById('info-card').classList.remove('show');
  document.getElementById('view-toggle').classList.remove('show');
  document.getElementById('overlay-img').classList.remove('visible');
  document.getElementById('scan-hint').style.display = '';
  buildSetupUI();
}

function resetMap() {
  if (!confirm('¿Borrar el mapa guardado?')) return;
  roomMap = {};
  saveMap();
  document.querySelectorAll('#compass-ring .compass-dot').forEach(d => d.remove());
  openSetup();
}

// ── COMPASS DOTS ──
const DOT_COLORS = { bano: '#60A5FA', sala: '#FBBF24' };
function addCompassDot(id, deg) {
  const ring = document.getElementById('compass-ring');
  const old = document.getElementById('dot-'+id);
  if (old) old.remove();
  const dot = document.createElement('div');
  dot.className = 'compass-dot';
  dot.id = 'dot-'+id;
  dot.style.setProperty('--a', deg+'deg');
  dot.style.background = DOT_COLORS[id] || '#fff';
  ring.appendChild(dot);
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

// ── INIT ──
(async () => {
  roomMap = loadMap();
  const hasMap = ROOM_IDS.every(id => roomMap[id] !== undefined);

  await startCamera();
  startOrientation();

  // Restore compass dots
  for (const id of ROOM_IDS) {
    if (roomMap[id] !== undefined) addCompassDot(id, roomMap[id]);
  }

  if (hasMap) {
    finishSetup();
  } else {
    buildSetupUI();
  }
})();
</script>
</body>
</html>
