<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR 3D Construcción</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
    canvas{display:block}

    /* ── PRE-AR SCREEN ── */
    #pre-ar{
      position:fixed;inset:0;background:#0a0a0a;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;padding:32px;z-index:100;
    }
    #pre-ar h1{font-size:28px;font-weight:900;color:#fff;text-align:center}
    #pre-ar p{font-size:14px;color:rgba(255,255,255,.45);text-align:center;line-height:1.6;max-width:280px}
    #start-btn{
      margin-top:12px;padding:16px 40px;border-radius:999px;border:none;cursor:pointer;
      font-size:16px;font-weight:800;color:#fff;
      background:linear-gradient(135deg,#3b82f6,#6366f1);
      box-shadow:0 8px 32px rgba(99,102,241,.4);
      transition:transform .15s;
    }
    #start-btn:active{transform:scale(.96)}
    #no-xr{color:#ef4444;font-size:13px;display:none;text-align:center}

    /* ── AR OVERLAY (dom-overlay) ── */
    #overlay{
      position:fixed;inset:0;pointer-events:none;z-index:10;
      display:none;
    }
    #overlay.active{display:block}

    #top-bar{
      position:absolute;top:16px;left:16px;right:16px;
      display:flex;justify-content:space-between;align-items:center;
    }
    .badge{
      background:rgba(0,0,0,.7);color:#fff;
      padding:7px 15px;border-radius:999px;font-size:13px;font-weight:700;
      backdrop-filter:blur(12px);
    }
    #hint-badge{
      background:rgba(251,191,36,.85);color:#fff;
      padding:7px 15px;border-radius:999px;font-size:13px;font-weight:700;
      backdrop-filter:blur(12px);animation:pulse 2s infinite;
    }
    #hint-badge.placed{background:rgba(34,197,94,.85);animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

    /* ── LAYERS ── */
    #layers{
      position:absolute;bottom:28px;left:0;right:0;
      display:flex;justify-content:center;gap:10px;padding:0 16px;
      pointer-events:all;
    }
    .layer-btn{
      display:flex;flex-direction:column;align-items:center;gap:3px;
      padding:10px 14px;border-radius:16px;border:2px solid transparent;
      font-size:11px;font-weight:800;color:#fff;cursor:pointer;
      backdrop-filter:blur(12px);transition:all .2s;min-width:72px;
      background:rgba(0,0,0,.55);
    }
    .layer-btn .icon{font-size:20px}
    .layer-btn.off{opacity:.4;transform:scale(.93)}

    /* Exit button */
    #exit-btn{
      position:absolute;top:16px;right:16px;
      padding:8px 16px;border-radius:999px;border:none;
      background:rgba(239,68,68,.8);color:#fff;font-size:13px;font-weight:700;
      cursor:pointer;backdrop-filter:blur(12px);pointer-events:all;
    }

    /* ── INFO CARD ── */
    #info-card{
      position:absolute;bottom:110px;left:16px;
      background:rgba(0,0,0,.75);border-radius:16px;padding:14px;
      backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);
      max-width:200px;display:none;
    }
    #info-card.show{display:block}
    #info-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:6px}
    .prog-bg{background:rgba(255,255,255,.15);border-radius:99px;height:6px;overflow:hidden;margin-bottom:4px}
    .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#22c55e,#86efac);transition:width .4s}
    #info-prog-label{font-size:11px;color:rgba(255,255,255,.5)}

    /* ── LOADING ── */
    #loading{
      position:fixed;inset:0;background:rgba(0,0,0,.8);
      display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
      z-index:200;color:#fff;
    }
    #loading.show{display:flex}
    .spin{font-size:44px;animation:spin 1.2s linear infinite}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<!-- Pre-AR screen -->
<div id="pre-ar">
  <div style="font-size:56px">🏗️</div>
  <h1>AR Construcción 3D</h1>
  <p>Coloca un modelo 3D de la obra en el suelo y explóralo caminando a su alrededor</p>
  <button id="start-btn" onclick="startAR()">Iniciar AR</button>
  <div id="no-xr">Tu dispositivo no soporta WebXR AR.<br>Requiere Android + Chrome.</div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spin">⚙️</div>
  <p style="font-size:16px;font-weight:700">Iniciando AR...</p>
</div>

<!-- AR Overlay (dom-overlay) -->
<div id="overlay">
  <div id="top-bar">
    <div class="badge">🏗️ AR 3D</div>
    <div id="hint-badge">Apunta al suelo → toca para colocar</div>
  </div>

  <div id="info-card">
    <div id="info-title">Modelo colocado</div>
    <div class="prog-bg"><div class="prog-fill" id="overall-prog" style="width:27%"></div></div>
    <div id="info-prog-label">27% completado</div>
  </div>

  <div id="layers">
    <button class="layer-btn" id="btn-estructura" style="border-color:#9CA3AF" onclick="toggleLayer('estructura')">
      <span class="icon">🧱</span><span>Estructura</span>
    </button>
    <button class="layer-btn" id="btn-fontaneria" style="border-color:#60A5FA" onclick="toggleLayer('fontaneria')">
      <span class="icon">💧</span><span>Fontanería</span>
    </button>
    <button class="layer-btn" id="btn-electrico" style="border-color:#FBBF24" onclick="toggleLayer('electrico')">
      <span class="icon">⚡</span><span>Eléctrico</span>
    </button>
    <button class="layer-btn" id="btn-acabados" style="border-color:#34D399" onclick="toggleLayer('acabados')">
      <span class="icon">🏠</span><span>Acabados</span>
    </button>
  </div>

  <button id="exit-btn" onclick="exitAR()">✕ Salir</button>
</div>

<script>
// ── THREE.JS SETUP ──
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(2, 4, 2);
scene.add(dirLight);

// ── RETICLE (placement indicator) ──
const reticleGeo = new THREE.RingGeometry(0.06, 0.08, 32).applyMatrix4(
  new THREE.Matrix4().makeRotationX(-Math.PI / 2)
);
const reticle = new THREE.Mesh(reticleGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide }));
reticle.matrixAutoUpdate = false;
reticle.visible = false;
scene.add(reticle);

// Reticle inner dot
const dotGeo = new THREE.CircleGeometry(0.02, 32);
dotGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
const dot = new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: 0x60A5FA }));
dot.matrixAutoUpdate = false;
reticle.add(dot);

// ── CONSTRUCTION MODEL ──
const S = 1.2;   // scale: 1.2m x 1.2m footprint
const SH = 0.6;  // height: 0.6m (represents ~3m at 1:5 scale)

const layerGroups = {
  estructura: new THREE.Group(),
  fontaneria: new THREE.Group(),
  electrico:  new THREE.Group(),
  acabados:   new THREE.Group(),
};
const layerState = { estructura: true, fontaneria: true, electrico: true, acabados: true };

const model = new THREE.Group();
Object.values(layerGroups).forEach(g => model.add(g));
model.visible = false;
scene.add(model);

function mat(color, opacity = 1, wire = false) {
  return new THREE.MeshPhongMaterial({
    color, transparent: opacity < 1, opacity,
    wireframe: wire, side: THREE.DoubleSide,
  });
}

function box(w, h, d, material, px = 0, py = 0, pz = 0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
  m.position.set(px, py, pz);
  return m;
}

function pipe(radius, height, material, px, py, pz, rotX = 0, rotZ = 0) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, height, 10), material);
  m.position.set(px, py, pz);
  m.rotation.x = rotX;
  m.rotation.z = rotZ;
  return m;
}

function buildModel() {
  const lg = layerGroups;
  const w2 = S / 2, d2 = S / 2;

  // ── ESTRUCTURA ──
  const wallM  = mat(0x9CA3AF, 0.25);
  const wallM2 = mat(0x6B7280, 0.5);
  const floorM = mat(0x374151, 0.35);

  // Floor
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(S, S), floorM);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = 0.001;
  lg.estructura.add(floor);

  // 4 walls
  lg.estructura.add(box(S, SH, 0.012, wallM,  0, SH/2, -d2));
  lg.estructura.add(box(S, SH, 0.012, wallM,  0, SH/2,  d2));
  lg.estructura.add(box(0.012, SH, S, wallM,  w2, SH/2, 0));
  lg.estructura.add(box(0.012, SH, S, wallM, -w2, SH/2, 0));

  // Bathroom partition wall
  lg.estructura.add(box(S * 0.42, SH, 0.018, wallM2, -S * 0.04, SH/2, -S * 0.14));

  // ── FONTANERÍA (blue/red) ──
  const pipeC  = mat(0x3B82F6, 0.9); // cold
  const pipeH  = mat(0xEF4444, 0.9); // hot
  const pipeD  = mat(0x1D4ED8, 0.9); // drain
  const fixtM  = mat(0x93C5FD, 0.45);
  const PR = 0.009, PRM = 0.013;

  // Main vertical supply (NW corner)
  lg.fontaneria.add(pipe(PRM, SH, pipeC, -w2+0.04, SH/2, -d2+0.04));

  // Cold horizontal to bathroom
  lg.fontaneria.add(pipe(PR, S*0.46, pipeC, -S*0.12, SH*0.26, -d2+0.07, 0, Math.PI/2));

  // Hot water line
  lg.fontaneria.add(pipe(PR, S*0.38, pipeH, -S*0.09, SH*0.36, -d2+0.05, 0, Math.PI/2));

  // Shower supply vertical
  lg.fontaneria.add(pipe(PR, SH*0.45, pipeC, -w2+0.06, SH*0.55, -d2*0.55, 0, 0));

  // Shower horizontal
  lg.fontaneria.add(pipe(PR, d2*0.3, pipeC, -w2+0.06, SH*0.75, -d2*0.4, Math.PI/2, 0));

  // Drains
  lg.fontaneria.add(pipe(0.016, SH*0.25, pipeD,  w2*0.55, SH*0.04, -d2*0.55)); // toilet drain
  lg.fontaneria.add(pipe(0.013, SH*0.2,  pipeD, -w2*0.55, SH*0.04, -d2*0.45)); // shower drain

  // Fixtures
  lg.fontaneria.add(box(0.11, 0.05, 0.14, fixtM,  w2*0.55, 0.025, -d2*0.55)); // toilet
  lg.fontaneria.add(box(0.09, 0.04, 0.07, fixtM,  w2*0.15, 0.04,  -d2+0.07)); // sink

  // Shower box
  const showerBox = new THREE.Mesh(new THREE.BoxGeometry(0.18, SH*0.55, 0.18), mat(0xBAE6FD, 0.18));
  showerBox.position.set(-w2*0.55, SH*0.28, -d2*0.45);
  lg.fontaneria.add(showerBox);

  // Pipe joints (spheres at connections)
  [[-w2+0.04, SH*0.26, -d2+0.07], [-w2+0.04, SH*0.36, -d2+0.05]].forEach(([x,y,z]) => {
    const j = new THREE.Mesh(new THREE.SphereGeometry(PRM*1.4, 8, 8), pipeC);
    j.position.set(x, y, z);
    lg.fontaneria.add(j);
  });

  // ── ELÉCTRICO (yellow) ──
  const condM  = mat(0xFBBF24, 0.92);
  const outM   = mat(0xF59E0B, 1);
  const panM   = mat(0xD97706, 1);
  const lightM = new THREE.MeshPhongMaterial({ color: 0xFDE68A, emissive: 0xFDE68A, emissiveIntensity: 0.5 });
  const CR = 0.007;

  // Main panel
  lg.electrico.add(box(0.07, 0.11, 0.018, panM, w2-0.02, SH*0.52, 0));

  // Ceiling conduits along all walls
  const condH = SH * 0.9;
  lg.electrico.add(pipe(CR, S,    condM, 0,      condH, -d2+0.025, 0, Math.PI/2)); // north
  lg.electrico.add(pipe(CR, S,    condM, 0,      condH,  d2-0.025, 0, Math.PI/2)); // south
  lg.electrico.add(pipe(CR, S*0.5,condM, w2-0.025,condH, -S*0.15,  Math.PI/2, 0)); // east-north
  lg.electrico.add(pipe(CR, S*0.5,condM, w2-0.025,condH,  S*0.15,  Math.PI/2, 0)); // east-south

  // Outlet drops + boxes
  const outlets = [
    [ w2*0.5,  d2*0.85],
    [-w2*0.5,  d2*0.85],
    [ w2*0.5, -d2*0.2 ],
    [-w2*0.5, -d2*0.2 ],
    [ 0,       d2*0.85],
  ];
  outlets.forEach(([x, z]) => {
    lg.electrico.add(pipe(CR, SH*0.72, condM, x, SH*0.54, z));
    lg.electrico.add(box(0.028, 0.028, 0.016, outM, x, SH*0.19, z));
  });

  // Ceiling lights
  [[-S*0.22,-S*0.22],[S*0.22,-S*0.22],[0,S*0.25]].forEach(([x,z]) => {
    const l = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.012, 16), lightM);
    l.position.set(x, SH - 0.006, z);
    lg.electrico.add(l);
    lg.electrico.add(pipe(CR*0.85, 0.12, condM, x, SH-0.06, z));
  });

  // Switches near door
  lg.electrico.add(box(0.025, 0.035, 0.015, outM, w2*0.15, SH*0.5, d2-0.02));

  // ── ACABADOS ──
  const bathFloorM = mat(0x93C5FD, 0.35);
  const woodFloorM = mat(0xD4A974, 0.3);
  const wallFinM   = mat(0x6EE7B7, 0.15);
  const tileWallM  = mat(0xBAFAF1, 0.2);

  // Bathroom floor tiles
  const bf = new THREE.Mesh(new THREE.PlaneGeometry(S*0.45, S*0.45), bathFloorM);
  bf.rotation.x = -Math.PI/2; bf.position.set(-S*0.275, 0.002, -S*0.275);
  lg.acabados.add(bf);

  // Living room wood floor
  const lf = new THREE.Mesh(new THREE.PlaneGeometry(S*0.55, S), woodFloorM);
  lf.rotation.x = -Math.PI/2; lf.position.set(S*0.225, 0.002, 0);
  lg.acabados.add(lf);

  // Wall finishes
  [[0, SH/2, -d2+0.014, 0],[0, SH/2, d2-0.014, Math.PI]].forEach(([x,y,z,ry]) => {
    const wf = new THREE.Mesh(new THREE.PlaneGeometry(S, SH), wallFinM);
    wf.position.set(x,y,z); wf.rotation.y = ry;
    lg.acabados.add(wf);
  });

  // Bathroom wall tiles
  [[-d2+0.015, 0],[-d2*0.55, -Math.PI/2]].forEach(([z, ry]) => {
    const tf = new THREE.Mesh(new THREE.PlaneGeometry(S*0.44, SH), tileWallM);
    tf.position.set(-S*0.28, SH/2, z); tf.rotation.y = ry;
    lg.acabados.add(tf);
  });
}

buildModel();

// ── LAYER TOGGLE ──
function toggleLayer(name) {
  layerState[name] = !layerState[name];
  layerGroups[name].visible = layerState[name];
  const btn = document.getElementById('btn-' + name);
  btn.classList.toggle('off', !layerState[name]);
}

// ── WEBXR ──
let hitTestSource = null;
let hitTestRequested = false;
let placed = false;
let xrSession = null;

async function startAR() {
  if (!navigator.xr) { document.getElementById('no-xr').style.display = 'block'; return; }
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) { document.getElementById('no-xr').style.display = 'block'; return; }

  document.getElementById('loading').classList.add('show');

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.getElementById('overlay') },
    });

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(xrSession);

    xrSession.addEventListener('end', onSessionEnd);

    // Select = tap to place
    xrSession.addEventListener('select', onTap);

    document.getElementById('pre-ar').style.display = 'none';
    document.getElementById('loading').classList.remove('show');
    document.getElementById('overlay').classList.add('active');

    renderer.setAnimationLoop(render);
  } catch (e) {
    console.error(e);
    document.getElementById('loading').classList.remove('show');
    document.getElementById('no-xr').textContent = 'Error: ' + e.message;
    document.getElementById('no-xr').style.display = 'block';
  }
}

function onTap() {
  if (!reticle.visible) return;
  if (!placed) {
    model.visible = true;
    placed = true;
    document.getElementById('hint-badge').textContent = 'Camina alrededor del modelo';
    document.getElementById('hint-badge').classList.add('placed');
    document.getElementById('info-card').classList.add('show');
    setTimeout(() => document.getElementById('hint-badge').style.display = 'none', 4000);
  }
  model.position.setFromMatrixPosition(reticle.matrix);
  model.rotation.y = Math.atan2(
    camera.position.x - model.position.x,
    camera.position.z - model.position.z
  );
}

function exitAR() {
  if (xrSession) xrSession.end();
}

function onSessionEnd() {
  xrSession = null;
  placed = false;
  model.visible = false;
  reticle.visible = false;
  hitTestSource = null;
  hitTestRequested = false;
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('pre-ar').style.display = 'flex';
  renderer.setAnimationLoop(null);
}

// ── RENDER LOOP ──
function render(timestamp, frame) {
  if (frame) {
    const refSpace = renderer.xr.getReferenceSpace();
    const session  = renderer.xr.getSession();

    // Setup hit test source once
    if (!hitTestRequested) {
      session.requestReferenceSpace('viewer').then(viewerSpace => {
        session.requestHitTestSource({ space: viewerSpace }).then(src => {
          hitTestSource = src;
        });
      });
      hitTestRequested = true;
    }

    // Update reticle from hit test
    if (hitTestSource) {
      const results = frame.getHitTestResults(hitTestSource);
      if (results.length > 0) {
        const pose = results[0].getPose(refSpace);
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
      } else {
        reticle.visible = false;
      }
    }
  }
  renderer.render(scene, camera);
}

// Check WebXR support on load
window.addEventListener('load', async () => {
  if (!navigator.xr || !await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false)) {
    document.getElementById('start-btn').style.opacity = '0.5';
    document.getElementById('no-xr').style.display = 'block';
    document.getElementById('no-xr').textContent = 'Requiere Android + Chrome con ARCore instalado';
  }
});
</script>
</body>
</html>
